spring.application.name=RemiPreparateur

# ── Base : conteneur Postgres DEDIE a ce projet (docker-compose, port 5434) ──
spring.datasource.url=jdbc:postgresql://localhost:5434/remi_preparateur
spring.datasource.username=root
spring.datasource.password=root

# ── Hibernate valide le schema, Flyway le construit ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

server.port=8080
python.api.url=http://localhost:8000

# ── Documents medicaux : dossier de stockage HORS web root, max 10 Mo ──
app.medical.upload-dir=./data/documents-medicaux
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ── Documents administratifs (licences, certificats...) : dossier HORS web root, max 10 Mo ──
app.documentadmin.upload-dir=./data/documents-administratifs

# ── Contrats & fiches de paye (V59) : PDF signes + bulletins, HORS web root ──
app.contrats.upload-dir=./data/contrats

# ── Hot reload (spring-boot-devtools) ──
# Redemarre automatiquement l'app quand target/classes change (compile a la sauvegarde dans l'IDE).
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# ── JWT ──
app.jwt.secret=Vk9uQ2hhbmdlTWVJblByb2RSZW1pQ1ByZXBhcmF0ZXVyU2VjcmV0S2V5MjAyNg==
app.jwt.expiration-ms=86400000

# ── Super-admin cree au demarrage si absent (a changer apres 1er login) ──
app.superadmin.email=superadmin@rcp.local
app.superadmin.password=ChangeMe2026!

# ── Web Push (VAPID) ──
# Generer une paire de cles VAPID (base64url) et les renseigner ici. Tant qu'elles sont
# vides, le push est desactive (les notifications restent in-app). Le front recupere la
# cle publique via GET /api/notifications/push/cle-publique.
# Generation possible avec : npx web-push generate-vapid-keys
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=mailto:contact@sportgestions.fr
